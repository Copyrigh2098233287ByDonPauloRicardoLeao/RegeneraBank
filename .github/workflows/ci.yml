name: Regenera Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/*", "release/v4.0.0-fsd-architecture" ]
  pull_request:
    branches: [ "main", "release/*", "release/v4.0.0-fsd-architecture" ]

jobs:
  devsecops-pipeline:
    name: Production Hardening DevSecOps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            1. Backend/package-lock.json
            3. FrontEnd/package-lock.json

      # --- BACKEND AUDIT & QUALITY GATE ---
      - name: Install Backend Dependencies
        working-directory: ./1. Backend
        run: npm ci

      - name: Backend Lint
        working-directory: ./1. Backend
        run: npm run lint

      - name: Backend Typecheck
        working-directory: ./1. Backend
        run: npm run typecheck

      - name: Backend Unit Tests & Coverage
        working-directory: ./1. Backend
        run: npm run test:cov

      - name: Backend E2E Tests
        working-directory: ./1. Backend
        run: npm run test:e2e

      - name: Backend Ledger Invariants Tests
        working-directory: ./1. Backend
        run: npm run test:ledger:invariants

      - name: Backend Build
        working-directory: ./1. Backend
        run: npm run build

      - name: Backend Migration Dry-Run
        working-directory: ./1. Backend
        run: |
          npm run migration:run
          npm run migration:revert

      - name: Dependency Security Audit
        working-directory: ./1. Backend
        run: npm audit --audit-level=critical

      - name: Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

      # --- FRONTEND AUDIT & QUALITY GATE ---
      - name: Install Frontend Dependencies
        working-directory: ./3. FrontEnd
        run: npm ci

      - name: Frontend Lint
        working-directory: ./3. FrontEnd
        run: npm run lint

      - name: Frontend Tests & Coverage
        working-directory: ./3. FrontEnd
        run: npm run test:cov

      - name: Frontend Build
        working-directory: ./3. FrontEnd
        run: npm run build


