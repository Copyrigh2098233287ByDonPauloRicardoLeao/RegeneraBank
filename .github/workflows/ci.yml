name: Regenera Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main", "release/*" ]

jobs:
  backend-test:
    name: Backend Tests & Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '1. Backend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./1. Backend
        run: npm ci

      - name: Run Linter
        working-directory: ./1. Backend
        run: npm run lint

      - name: Run Unit & Integration Tests (Coverage > 80%)
        working-directory: ./1. Backend
        run: npm run test:cov

      - name: Run E2E Tests
        working-directory: ./1. Backend
        run: npm run test:e2e

  frontend-test:
    name: Frontend Vitest & Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '3. FrontEnd/package-lock.json'

      - name: Install Dependencies
        working-directory: ./3. FrontEnd
        run: npm ci

      - name: Run Linter
        working-directory: ./3. FrontEnd
        run: npm run lint

      - name: Run React Unit Tests (Coverage > 80%)
        working-directory: ./3. FrontEnd
        run: npm run test:cov

  mobile-test:
    name: Mobile Jest & Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '2. Mobile/package-lock.json'

      - name: Install Dependencies
        working-directory: ./2. Mobile
        run: npm ci

      - name: Run React Native Unit Tests (Coverage > 80%)
        working-directory: ./2. Mobile
        run: npm run test:cov
